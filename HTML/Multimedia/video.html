<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video</title>
</head>
<body>
    <!-- without controls video is treated as image -->
    <video src="https://www.pexels.com/download/video/37898767/" controls width="400px"></video>
     
     
    <video src="https://www.pexels.com/download/video/37898767/" controls autoplay muted width="400px"></video>

    <!-- use when browser is not capable for running one format video -->

    <video controls width="400px">
        <source src="https://www.pexels.com/download/video/37898767/">
        <source src="https://www.pexels.com/download/video/34806588/">
    </video>
    
</body>
</html>
