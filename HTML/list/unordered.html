<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unordered List</title>
</head>
<body>
    <ul>
        <li>Book</li>
        <li>Copy</li>
        <li>Pen</li>
        <li>Pencil</li>
        <li>Graph</li>
        <li>Scale</li>
    </ul>

    <!--Types Of Markers in Unoredered list-->
    

    <ul type="square">
        <li>Book</li>
        <li>Copy</li>
        <li>Pen</li>
        <li>Pencil</li>
        <li>Graph</li>
        <li>Scale</li>
    </ul>

    <ul type="circle">
        <li>Book</li>
        <li>Copy</li>
        <li>Pen</li>
        <li>Pencil</li>
        <li>Graph</li>
        <li>Scale</li>
    </ul>

    <!--Default one-->
    <ul type="disc">
        <li>Book</li>
        <li>Copy</li>
        <li>Pen</li>
        <li>Pencil</li>
        <li>Graph</li>
        <li>Scale</li>
    </ul>

    <ul type="none">
        <li>Book</li>
        <li>Copy</li>
        <li>Pen</li>
        <li>Pencil</li>
        <li>Graph</li>
        <li>Scale</li>
    </ul>
</body>
</html>
