<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Entity</title>
</head>
<body>
    <!--Start with & end with ;-->
    <!-- For & -->
    <h1>&amp:</h1>      

    <!-- For >  < -->
    <h1>a&lt;b</h1>
    <h1>a&gt;b</h1>

    <!-- For  ""-->
    <h1>&quot;a</h1>

    <!-- For Extra Space -->
    <h1>a&nbsp; &nbsp;b</h1>
    
    <!-- Copyright -->
     <h1>&copy;</h1>

    <!--Trademark-->
    <h1>&trade;</h1>
    <!-- Registered Trademark -->
     <h1>&reg;</h1>


     <!-- e can use unicode number also search on google -->
      <h1>&#9733;</h1>
</body>
</html>
